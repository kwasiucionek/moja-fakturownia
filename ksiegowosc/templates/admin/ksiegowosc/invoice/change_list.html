{% extends "admin/change_list.html" %} {% block object-tools-items %}
<a
    href="{% url 'admin:ksiegowosc_invoice_send_ksef' %}"
    class="btn btn-primary"
    id="send-ksef-btn"
    style="background-color: #004a99; border-color: #003366"
>
    <i class="fas fa-cloud-upload-alt"></i>
    Wyślij do KSeF
</a>

<a
    href="#"
    class="btn btn-danger"
    id="reset-ksef-btn"
    style="background-color: #dc3545; border-color: #bd2130"
>
    <i class="fas fa-undo"></i>
    Zresetuj statusy KSeF
</a>

<a
    href="{% url 'admin:ksiegowosc_invoice_import_jpk' %}"
    class="btn btn-primary"
>
    <i class="fas fa-file-import"></i>
    Importuj z JPK
</a>

<a
    href="{% url 'admin:ksiegowosc_invoice_export_jpk' %}"
    class="btn btn-success"
    id="export-jpk-btn"
>
    <i class="fas fa-file-export"></i>
    Eksportuj zaznaczone do JPK
</a>

{{ block.super }} {% endblock %} {% block extrahead %}{{ block.super }}
<script>
    document.addEventListener("DOMContentLoaded", function () {
        // Funkcja pobierająca zaznaczone ID
        const getSelectedIds = () =>
            Array.from(
                document.querySelectorAll(
                    "#result_list input.action-select:checked",
                ),
            ).map((cb) => cb.value);

        // Obsługa przycisku KSeF
        const ksefBtn = document.getElementById("send-ksef-btn");
        if (ksefBtn) {
            ksefBtn.addEventListener("click", function (event) {
                event.preventDefault();
                const selected = getSelectedIds();
                if (selected.length === 0) {
                    alert(
                        "Proszę zaznaczyć przynajmniej jedną fakturę do wysyłki.",
                    );
                    return;
                }
                window.location.href = this.href + "?ids=" + selected.join(",");
            });
        }

        // Obsługa przycisku Resetu (używa standardowego formularza akcji Django)
        const resetBtn = document.getElementById("reset-ksef-btn");
        if (resetBtn) {
            resetBtn.addEventListener("click", function (event) {
                event.preventDefault();
                const selected = getSelectedIds();
                if (selected.length === 0) {
                    alert("Proszę zaznaczyć faktury do zresetowania.");
                    return;
                }
                if (
                    confirm(
                        "Czy na pewno chcesz wyczyścić status KSeF dla " +
                            selected.length +
                            " faktur?",
                    )
                ) {
                    const actionSelect = document.querySelector(
                        'select[name="action"]',
                    );
                    const index = Array.from(actionSelect.options).findIndex(
                        (opt) => opt.value === "reset_ksef_status_action",
                    );
                    if (index !== -1) {
                        actionSelect.selectedIndex = index;
                        document.getElementById("changelist-form").submit();
                    } else {
                        alert(
                            "Błąd: Nie znaleziono akcji resetowania w systemie.",
                        );
                    }
                }
            });
        }
    });
</script>
{% endblock %}
